name: Refresh county risk rankings

"on":
  schedule:
    # Weekly, Sunday 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-rankings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Compute rankings
        working-directory: backend
        env:
          MIREYE_BEARER_TOKEN: ${{ secrets.MIREYE_BEARER_TOKEN }}
          GFW_API_KEY: ${{ secrets.GFW_API_KEY }}
        run: python3 precompute_rankings.py --counties-file counties_full.csv --out rankings_cache.json --workers 10

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/rankings_cache.json
          if git diff --cached --quiet; then
            echo "No changes to rankings_cache.json, skipping commit."
            exit 0
          fi
          git commit -m "Refresh county risk rankings [automated]"
          git pull --rebase origin main
          git push origin main
